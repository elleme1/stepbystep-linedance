<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="구양희 STEP-BY-STEP" />

  <title>구양희 STEP-BY-STEP 💃 라인댄스</title>
  <meta name="description" content="라인댄스 회원을 위한 수업 일정, 안무 영상, 공지사항 앱" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="구양희 STEP-BY-STEP 💃 라인댄스" />
  <meta property="og:description" content="라인댄스 회원을 위한 수업 일정, 안무 영상, 공지사항을 확인하세요!" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
</head>

<body>
  <noscript>앱을 사용하려면 기기의 자바스크립트를 활성화해주세요.</noscript>

  <div id="root" style="background-color: #0a0a0f; min-height: 100vh;"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          // 60초마다 업데이트 확인
          setInterval(() => reg.update(), 60000);
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                window.location.reload();
              }
            });
          });
        }).catch((error) => {
          console.error('Service Worker 등록 실패:', error);
        });
      });
    }
  </script>
</body>

</html>
