<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="스텝바이스텝" />

  <title>스텝바이스텝 💃 라인댄스</title>
  <meta name="description" content="라인댄스 회원을 위한 수업 일정, 안무 영상, 공지사항 앱" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="스텝바이스텝 💃 라인댄스" />
  <meta property="og:description" content="라인댄스 회원을 위한 수업 일정, 안무 영상, 공지사항을 확인하세요!" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
</head>

<body>
  <noscript>앱을 사용하려면 기기의 자바스크립트를 활성화해주세요.</noscript>

  <div id="root" style="background-color: #0a0a0f; min-height: 100vh;">
    <div
      style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;">
      <style>
        .initial-loader {
          width: 48px;
          height: 48px;
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-top-color: #ff3366;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        }

        @keyframes spin {
          100% {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="initial-loader"></div>
      <div style="color: #888; font-size: 15px; font-family: sans-serif;">앱을 준비하는 중입니다 💃</div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {

          // 앱 열 때마다 + 30분마다 업데이트 확인
          setInterval(() => reg.update(), 1000 * 60 * 30);

          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {

              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                // 예쁜 업데이트 토스트 배너 표시
                showUpdateBanner();
              }

            });
          });
        }).catch((error) => {
          console.error('Service Worker 등록 실패:', error);
        });
      });
    }

    function showUpdateBanner() {
      // 이미 배너가 떠있으면 무시
      if (document.getElementById('sw-update-banner')) return;

      const banner = document.createElement('div');
      banner.id = 'sw-update-banner';
      banner.innerHTML = `
        <div style="
          position: fixed; bottom: 80px; left: 16px; right: 16px;
          background: linear-gradient(135deg, #ff3366 0%, #ff6699 100%);
          color: white; padding: 16px 20px; border-radius: 16px;
          box-shadow: 0 8px 32px rgba(255,51,102,0.4);
          z-index: 99999; cursor: pointer;
          display: flex; align-items: center; gap: 12px;
          animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        " onclick="window.location.reload()">
          <span style="font-size: 28px;">✨</span>
          <div style="flex: 1;">
            <div style="font-size: 15px; font-weight: 700; margin-bottom: 2px;">
              새로운 업데이트가 있어요!
            </div>
            <div style="font-size: 13px; opacity: 0.9;">
              여기를 탭하면 최신 버전으로 새로고침됩니다
            </div>
          </div>
          <span style="font-size: 20px;">→</span>
        </div>
      `;
      document.body.appendChild(banner);

      // 슬라이드업 애니메이션
      if (!document.getElementById('sw-update-style')) {
        const style = document.createElement('style');
        style.id = 'sw-update-style';
        style.textContent = `
          @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
      }
    }
  </script>
</body>

</html>
