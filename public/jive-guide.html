<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자이브 통합루틴 진행교본</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0f0f1a;color:#e8e8f0;min-height:100vh;padding:16px;padding-bottom:80px}
.header{text-align:center;padding:32px 16px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:20px;margin-bottom:24px;border:1px solid rgba(255,255,255,.08)}
.header h1{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#f7d794,#f19066);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header .subtitle{font-size:.85rem;color:#a0a0c0;line-height:1.6}
.count-badge{display:inline-block;background:rgba(247,215,148,.15);color:#f7d794;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;margin-top:10px}
.section{margin-bottom:28px}
.section-title{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:14px;margin-bottom:14px;border:1px solid rgba(255,255,255,.1)}
.section-title .emoji{font-size:1.3rem}
.section-title h2{font-size:1.1rem;font-weight:700;color:#e8e8f0}
.section-title .badge{font-size:.75rem;color:#a0a0c0;background:rgba(255,255,255,.06);padding:2px 10px;border-radius:20px;margin-left:auto}
.lv-beginner{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(16,185,129,.03));border-color:rgba(16,185,129,.15)!important}
.lv-silver{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(99,102,241,.03));border-color:rgba(99,102,241,.15)!important}
.lv-goldA{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(245,158,11,.03));border-color:rgba(245,158,11,.15)!important}
.lv-goldB{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.02));border-color:rgba(239,68,68,.12)!important}
.lv-goldC{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(168,85,247,.02));border-color:rgba(168,85,247,.12)!important}
.lv-goldD{background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(236,72,153,.02));border-color:rgba(236,72,153,.12)!important}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:all .3s}
.card-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.card-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.beginner .card-num{background:rgba(16,185,129,.15);color:#10b981}
.silver .card-num{background:rgba(99,102,241,.15);color:#818cf8}
.goldA .card-num{background:rgba(245,158,11,.15);color:#f59e0b}
.goldB .card-num{background:rgba(239,68,68,.12);color:#f87171}
.goldC .card-num{background:rgba(168,85,247,.12);color:#a855f7}
.goldD .card-num{background:rgba(236,72,153,.12);color:#ec4899}
.card-info{flex:1;min-width:0}
.card-info h3{font-size:.92rem;font-weight:700;margin-bottom:2px}
.card-info p{font-size:.76rem;color:#a0a0c0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arrow{width:20px;height:20px;color:#666;transition:transform .3s;flex-shrink:0}
.card.open .arrow{transform:rotate(180deg)}
.card-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.card.open .card-body{max-height:800px}
.card-body-inner{padding:0 16px 16px;border-top:1px solid rgba(255,255,255,.06)}
.feel{margin-top:12px;padding:10px 14px;background:rgba(247,215,148,.06);border-left:3px solid #f7d794;border-radius:0 10px 10px 0;font-size:.83rem;color:#f0e0b0;line-height:1.6}
.count-info{margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:10px;font-size:.82rem;color:#c0c0d8}
.count-info strong{color:#818cf8}
.steps{margin-top:10px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px}
.steps div{font-size:.82rem;line-height:1.9;color:#d0d0e8}
.steps .num{color:#f19066;font-weight:700;margin-right:6px}
.tip{margin-top:10px;padding:10px 14px;background:rgba(16,185,129,.06);border-radius:10px;font-size:.82rem;color:#6ee7b7;line-height:1.6}
.tip::before{content:'💡 '}
.memo{margin-top:6px;padding:6px 12px;background:rgba(99,102,241,.08);border-radius:8px;font-size:.78rem;color:#a5b4fc}
.memo::before{content:'📝 '}
.footer{text-align:center;margin-top:32px;padding:16px;color:#555;font-size:.75rem;border-top:1px solid rgba(255,255,255,.05)}
</style>
</head>

function renderCards(id, lv){
const c=document.getElementById(id);
D.filter(x=>x.lv===lv).forEach(x=>{
const el=document.createElement('div');
el.className=`card ${lv}`;
el.innerHTML=`
<div class="card-header" onclick="this.parentElement.classList.toggle('open')">
  <div class="card-num">${x.n}</div>
  <div class="card-info"><h3>${x.t}</h3><p>${x.d}</p></div>
  <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
</div>
<div class="card-body"><div class="card-body-inner">
  <div class="feel">🎯 <strong>${x.t}</strong> (${x.e})<br>${x.feel}</div>
  <div class="count-info">🎵 카운트: <strong>${x.count}</strong></div>
  <div class="steps">${x.steps.map(s=>{const m=s.match(/^([^:]+):(.*)/);return m?`<div><span class="num">${m[1]}:</span>${m[2]}</div>`:`<div>${s}</div>`;}).join('')}</div>
  <div class="tip">${x.tip}</div>
  ${x.memo?`<div class="memo">${x.memo}</div>`:''}
</div></div>`;
c.appendChild(el);
});
}
