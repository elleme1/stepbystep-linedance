<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="스텝바이스텝" />

  <title>스텝바이스텝 💃 라인댄스</title>
  <meta name="description" content="라인댄스 회원을 위한 수업 일정, 안무 영상, 공지사항 앱" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="스텝바이스텝 💃 라인댄스" />
  <meta property="og:description" content="라인댄스 회원을 위한 수업 일정, 안무 영상, 공지사항을 확인하세요!" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
</head>

<body>
  <noscript>앱을 사용하려면 기기의 자바스크립트를 활성화해주세요.</noscript>

  <div id="root" style="background-color: #0a0a0f; min-height: 100vh;">
    <div
      style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;">
      <style>
        .initial-loader {
          width: 48px;
          height: 48px;
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-top-color: #ff3366;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        }

        @keyframes spin {
          100% {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="initial-loader"></div>
      <div style="color: #888; font-size: 15px; font-family: sans-serif;">앱을 준비하는 중입니다 💃</div>
    </div>
  </div>

  <!-- 업데이트 알림 토스트 -->
  <div id="update-toast" style="display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(30, 30, 40, 0.95); backdrop-filter: blur(10px); border: 1px solid #ff2d55; border-radius: 12px; padding: 16px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 9999; width: 90%; max-width: 320px; text-align: center; color: #fff; font-family: sans-serif;">
    <p style="margin: 0 0 12px 0; font-size: 15px; line-height: 1.5; font-weight: bold;">✨ 스텝바이스텝 앱의<br/>새로운 내용이 추가되었습니다!</p>
    <div style="display: flex; gap: 10px;">
      <button onclick="document.getElementById('update-toast').style.display='none'" style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: #333; color: #ccc; font-weight: bold; cursor: pointer;">나중에</button>
      <button id="update-btn" style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: #ff2d55; color: #fff; font-weight: bold; cursor: pointer;">업데이트</button>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      let newWorker;

      // 새 서비스워커가 교대 완료되면 딱 1번만 새로고침
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      // '업데이트' 버튼 → 새 서비스워커에게 교대 명령
      document.getElementById('update-btn').addEventListener('click', () => {
        document.getElementById('update-toast').style.display = 'none';
        if (newWorker) {
          newWorker.postMessage({ type: 'SKIP_WAITING' });
        }
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          // 새 버전 감지 시 토스트 팝업 표시
          reg.addEventListener('updatefound', () => {
            newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                document.getElementById('update-toast').style.display = 'block';
              }
            });
          });

          // 5분마다 백그라운드에서 업데이트 확인
          setInterval(() => {
            reg.update().catch(err => console.log('업데이트 확인 실패:', err));
          }, 1000 * 60 * 5);
        }).catch((error) => {
          console.error('Service Worker 등록 실패:', error);
        });
      });
    }
  </script>
</body>

</html>
